<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="order.css">
</head>
<body>
<div class="order-container">

  <h1><span class="one">Order</span> NovaWatch <span class="x3">X</span></h1>
  <p>Fill in your details to place your order.</p>

  <form>

    <label>Full Name</label>
    <input type="text" placeholder="Enter your name" required>

    <label>Email Address</label>
    <input type="email" placeholder="Enter your email" required>

    <label>Phone Number</label>
    <input type="tel" placeholder="Enter your phone number" required>

    <label>Select Model</label>
    <select required>
      <option>Nova Black - ₹6,999</option>
      <option>Nova Silver - ₹7,499</option>
      <option>Nova Ocean Blue - ₹8,499</option>
      <option>Nova Rose Gold - ₹7,999</option>
    </select>

    <label>Delivery Address</label>
    <textarea rows="4" placeholder="Enter your address"></textarea>

    <button type="submit">Place Order</button>

  </form>

  <a href="index.html" class="back-btn">← Back to Home</a>

</div>
</body>
</html>
